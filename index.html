<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0d0f0d">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Physique Lab">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="stylesheet" href="css/app.css?v=21">
  <link rel="stylesheet" href="css/themes.css?v=21">
  <title>Matt &amp; Lynny's Physique Lab</title>
</head>
<body>

  <div id="landing">
    <div class="landing-bg"><div class="landing-particles" id="particles"></div></div>
    <div class="landing-content">
      <div class="landing-logo-wrap">
        <img src="icons/logo.png?v=21" alt="Physique Lab" class="landing-logo">
      </div>
      <div class="landing-title">Matt &amp; Lynny's<br>Physique Lab</div>
      <div class="landing-tagline">Welcome to the lab &#x1F9EA; Let's get cooking.</div>
      <div class="profile-cards">
        <button class="profile-card" id="card-matt" onclick="Auth.selectProfile('matt')">
          <div class="profile-avatar matt-avatar">
            <svg width="36" height="36" viewBox="0 0 36 36" fill="none"><path d="M18 4C14 4 11 7 11 11C11 15 14 18 18 18C22 18 25 15 25 11C25 7 22 4 18 4Z" fill="currentColor"/><path d="M6 32C6 26 11 22 18 22C25 22 30 26 30 32" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" fill="none"/></svg>
          </div>
          <div class="profile-name">Matt</div>
          <div class="profile-sub">Green Lab</div>
          <div class="profile-lock"><svg width="14" height="14" viewBox="0 0 14 14" fill="none"><rect x="2" y="6" width="10" height="7" rx="2" stroke="currentColor" stroke-width="1.5"/><path d="M4 6V4.5C4 3 5 2 7 2C9 2 10 3 10 4.5V6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg></div>
        </button>
        <button class="profile-card" id="card-lynny" onclick="Auth.selectProfile('lynny')">
          <div class="profile-avatar lynny-avatar">
            <svg width="36" height="36" viewBox="0 0 36 36" fill="none"><path d="M18 4C14 4 11 7 11 11C11 15 14 18 18 18C22 18 25 15 25 11C25 7 22 4 18 4Z" fill="currentColor"/><path d="M6 32C6 26 11 22 18 22C25 22 30 26 30 32" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" fill="none"/></svg>
          </div>
          <div class="profile-name">Lynny</div>
          <div class="profile-sub">Pink Lab</div>
          <div class="profile-lock"><svg width="14" height="14" viewBox="0 0 14 14" fill="none"><rect x="2" y="6" width="10" height="7" rx="2" stroke="currentColor" stroke-width="1.5"/><path d="M4 6V4.5C4 3 5 2 7 2C9 2 10 3 10 4.5V6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg></div>
        </button>
        <button class="profile-card" id="card-guest" onclick="Auth.selectProfile('guest')">
          <div class="profile-avatar guest-avatar" style="background:none;border:none;width:60px;height:60px;">
            <img src="icons/jarjar.png?v=21" alt="Jar Jar" style="width:60px;height:60px;border-radius:50%;object-fit:cover;">
          </div>
          <div class="profile-name">Guest</div>
          <div class="profile-sub">No password</div>
          <div class="profile-lock"><svg width="14" height="14" viewBox="0 0 14 14" fill="none"><rect x="2" y="5" width="10" height="8" rx="2" stroke="currentColor" stroke-width="1.5"/><path d="M4.5 5V4C4.5 3 5.5 2 7 2C8.5 2 9.5 3 9.5 4V5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-dasharray="2 1.5"/></svg></div>
        </button>
      </div>
      <div class="landing-footer">Data is private per profile &middot; Works offline</div>
    </div>
  </div>

  <div id="auth-modal" class="hidden">
    <div class="auth-box">
      <div class="auth-avatar" id="auth-avatar"></div>
      <div class="auth-name" id="auth-name"></div>
      <div class="auth-label">Enter password</div>
      <input type="password" id="auth-input" class="auth-input" placeholder="Password"
        onkeydown="if(event.key==='Enter')Auth.submitPassword()" autocomplete="current-password">
      <div class="auth-error hidden" id="auth-error">Incorrect password. Try again.</div>
      <button class="auth-btn" onclick="Auth.submitPassword()">Enter Lab</button>
      <button class="auth-cancel" onclick="Auth.cancel()">Cancel</button>
    </div>
  </div>

  <div id="app" class="hidden">
    <header id="app-header">
      <div class="header-inner">
        <div class="logo">
          <div class="logo-flask">
            <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
              <path d="M6 2V8L2 14.5C1.5 15.5 2.2 17 3.5 17H14.5C15.8 17 16.5 15.5 16 14.5L12 8V2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
              <line x1="5" y1="5" x2="13" y2="5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
              <circle cx="7" cy="13" r="1" fill="currentColor" opacity="0.7"/>
              <circle cx="11" cy="12" r="1.5" fill="currentColor" opacity="0.9"/>
            </svg>
          </div>
          <div class="logo-text">
            <span class="logo-name" id="header-profile-name">Physique Lab</span>
            <span class="logo-tagline">Hypertrophy Intelligence</span>
          </div>
        </div>
        <div id="header-right"></div>
      </div>
    </header>

    <main id="screens">
      <div id="screen-log"       class="screen active"></div>
      <div id="screen-progress"  class="screen"></div>
      <div id="screen-deload"    class="screen"></div>
      <div id="screen-programme" class="screen"></div>
      <div id="screen-rehab"     class="screen"></div>
    </main>

    <nav id="bottom-nav">
      <button class="nav-btn active" data-screen="log">
        <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
          <rect x="3" y="3" width="16" height="16" rx="2" stroke="currentColor" stroke-width="2"/>
          <line x1="3" y1="8" x2="19" y2="8" stroke="currentColor" stroke-width="1.5"/>
          <line x1="8" y1="8" x2="8" y2="19" stroke="currentColor" stroke-width="1.5"/>
        </svg>
        <span>Log</span>
      </button>
      <button class="nav-btn" data-screen="progress">
        <svg width="22" height="22" viewBox="0 0 22 22" fill="none"><polyline points="3,17 8,10 12,13 19,4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/><circle cx="19" cy="4" r="2" fill="currentColor"/></svg>
        <span>Progress</span>
      </button>
      <button class="nav-btn" data-screen="deload">
        <svg width="22" height="22" viewBox="0 0 22 22" fill="none"><circle cx="11" cy="11" r="8" stroke="currentColor" stroke-width="2"/><path d="M11 7V11L14 13" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        <span>Deload</span>
      </button>
      <button class="nav-btn" data-screen="programme">
        <svg width="22" height="22" viewBox="0 0 22 22" fill="none"><circle cx="11" cy="11" r="3" stroke="currentColor" stroke-width="2"/><path d="M11 2V4M11 18V20M2 11H4M18 11H20M4.2 4.2L5.6 5.6M16.4 16.4L17.8 17.8M4.2 17.8L5.6 16.4M16.4 5.6L17.8 4.2" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
        <span>Program</span>
      </button>
      <button class="nav-btn nav-btn-rehab hidden" data-screen="rehab">
        <svg width="22" height="22" viewBox="0 0 22 22" fill="none"><path d="M11 3C7 3 4 6 4 10C4 14 7 17 11 17" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><path d="M11 17C15 17 18 14 18 10C18 6 15 3 11 3" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-dasharray="3 2"/><line x1="11" y1="7" x2="11" y2="13" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><line x1="8" y1="10" x2="14" y2="10" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        <span>Rehab</span>
      </button>
    </nav>
  </div>

  <div id="modal-overlay" class="hidden"><div id="modal-box"></div></div>
  <div id="toast" class="hidden"></div>

  <script src="js/data.js?v=21"></script>
  <script src="js/log.js?v=21"></script>
  <script src="js/screens.js?v=21"></script>
  <script src="js/rehab.js?v=21"></script>
  <script src="js/app.js?v=21"></script>
</body>
</html>
