<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0d0f0d">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Physique Lab">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="stylesheet" href="css/app.css">
  <title>Matt's Physique Lab</title>
</head>
<body>

  <div id="app">

    <!-- HEADER -->
    <header id="app-header">
      <div class="header-inner">
        <div class="logo">
          <div class="logo-flask">
            <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
              <path d="M6 2V8L2 14.5C1.5 15.5 2.2 17 3.5 17H14.5C15.8 17 16.5 15.5 16 14.5L12 8V2" stroke="#4afc7a" stroke-width="1.5" stroke-linecap="round"/>
              <line x1="5" y1="5" x2="13" y2="5" stroke="#4afc7a" stroke-width="1.5" stroke-linecap="round"/>
              <circle cx="7" cy="13" r="1" fill="#4afc7a" opacity="0.6"/>
              <circle cx="11" cy="12" r="1.5" fill="#4afc7a" opacity="0.8"/>
            </svg>
          </div>
          <div class="logo-text">
            <span class="logo-name">Matt's Physique Lab</span>
            <span class="logo-tagline">Hypertrophy Intelligence</span>
          </div>
        </div>
        <div id="header-right"></div>
      </div>
    </header>

    <!-- SCREENS -->
    <main id="screens">
      <div id="screen-today" class="screen active"></div>
      <div id="screen-progress" class="screen"></div>
      <div id="screen-deload" class="screen"></div>
      <div id="screen-history" class="screen"></div>
      <div id="screen-programme" class="screen"></div>
    </main>

    <!-- BOTTOM NAV -->
    <nav id="bottom-nav">
      <button class="nav-btn active" data-screen="today">
        <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
          <rect x="3" y="11" width="4" height="8" rx="1.5" fill="currentColor"/>
          <rect x="9" y="7" width="4" height="12" rx="1.5" fill="currentColor"/>
          <rect x="15" y="3" width="4" height="16" rx="1.5" fill="currentColor"/>
        </svg>
        <span>Today</span>
      </button>
      <button class="nav-btn" data-screen="progress">
        <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
          <polyline points="3,17 8,10 12,13 19,4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
          <circle cx="19" cy="4" r="2" fill="currentColor"/>
        </svg>
        <span>Progress</span>
      </button>
      <button class="nav-btn" data-screen="deload">
        <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
          <circle cx="11" cy="11" r="8" stroke="currentColor" stroke-width="2"/>
          <path d="M11 7V11L14 13" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
        <span>Deload</span>
      </button>
      <button class="nav-btn" data-screen="history">
        <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
          <rect x="3" y="4" width="16" height="14" rx="2" stroke="currentColor" stroke-width="2"/>
          <line x1="7" y1="9" x2="15" y2="9" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          <line x1="7" y1="13" x2="12" y2="13" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        <span>History</span>
      </button>
      <button class="nav-btn" data-screen="programme">
        <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
          <circle cx="11" cy="11" r="3" stroke="currentColor" stroke-width="2"/>
          <path d="M11 2V4M11 18V20M2 11H4M18 11H20M4.2 4.2L5.6 5.6M16.4 16.4L17.8 17.8M4.2 17.8L5.6 16.4M16.4 5.6L17.8 4.2" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
        </svg>
        <span>Programme</span>
      </button>
    </nav>

  </div>

  <!-- MODAL OVERLAY -->
  <div id="modal-overlay" class="hidden">
    <div id="modal-box"></div>
  </div>

  <!-- TOAST -->
  <div id="toast" class="hidden"></div>

  <script src="js/data.js"></script>
  <script src="js/screens.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
